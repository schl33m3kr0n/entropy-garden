# Netlify: build creates dist/, then publishes dist/.
# In Netlify UI → Build settings → leave "Publish directory" BLANK (netlify.toml wins).
[build]
  command = "bash scripts/deploy-netlify.sh"
  publish = "dist"

# Skip post-processing (form scan, asset optimization) — avoids hangs on media-heavy static sites.
[build.processing]
  skip_processing = true

# One header block — redundant rules slow/fail post-processing header parsing.
[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/js/*"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/pages/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"
