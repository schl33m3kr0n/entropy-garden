<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cipher glyph audit — Entropy Garden</title>
  <style>
    :root {
      --bg: #050505;
      --panel: #111;
      --border: #2a2a2a;
      --text: #cfcfcf;
      --muted: #888;
      --green: #0f0;
      --red: #ff4466;
      --amber: #ffb020;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 2;
      background: rgba(5, 5, 5, 0.92);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      backdrop-filter: blur(6px);
    }
    h1 { margin: 0 0 6px; font-size: 1rem; color: var(--green); }
    .note { color: var(--muted); font-size: 12px; max-width: 72ch; }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
      align-items: center;
    }
    button, select, label {
      font: inherit;
      color: var(--text);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
    }
    button { cursor: pointer; }
    button:hover { border-color: var(--green); color: var(--green); }
    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 8px;
      font-size: 12px;
    }
    .stats span { color: var(--muted); }
    .stats strong.ok { color: var(--green); }
    .stats strong.bad { color: var(--red); }
    .stats strong.warn { color: var(--amber); }
    main { padding: 16px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(108px, 1fr));
      gap: 8px;
    }
    .cell {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      padding: 8px 6px 6px;
      text-align: center;
      min-height: 108px;
    }
    .cell.bad {
      border-color: var(--red);
      box-shadow: 0 0 0 1px rgba(255, 68, 102, 0.35);
      background: #1a0a0e;
    }
    .cell.warn {
      border-color: var(--amber);
      background: #1a1408;
    }
    .glyph {
      font-size: 28px;
      line-height: 1.1;
      min-height: 34px;
      color: var(--green);
      word-break: break-all;
    }
    .cell.bad .glyph { color: var(--red); }
    .code { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .meta { font-size: 10px; color: #666; margin-top: 2px; }
    .tag {
      display: inline-block;
      margin-top: 4px;
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 10px;
      background: #222;
      color: var(--muted);
    }
    .cell.bad .tag { background: #3a1018; color: #ff99aa; }
    .cell.warn .tag { background: #2a2010; color: #ffcc88; }
    #fail-list {
      margin: 0 0 16px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #0d0d0d;
      white-space: pre-wrap;
      word-break: break-all;
      font-size: 12px;
      max-height: 180px;
      overflow: auto;
      display: none;
    }
    #fail-list.visible { display: block; }
    canvas#thumb-probe { display: none; }
  </style>
</head>
<body>
  <header>
    <h1>Cipher glyph audit</h1>
    <p class="note">
      Probes every glyph with the same font stack as cipher wheels. Does <strong>not</strong> read or write
      <code>localStorage</code> — safe for Firefox private. Numbered Last Resort boxes are flagged via
      <code>measureText</code> width (and optional canvas raster when readback works).
    </p>
    <div class="toolbar">
      <label>
        Pool
        <select id="pool-select">
          <option value="full">FULL_MATRIX_CHARS</option>
          <option value="section">By section…</option>
        </select>
      </label>
      <select id="section-select" hidden></select>
      <label>
        Font size
        <select id="size-select">
          <option value="16" selected>16px (desktop)</option>
          <option value="14">14px</option>
          <option value="18">18px</option>
        </select>
      </label>
      <label><input type="checkbox" id="failures-only" /> Failures only</label>
      <label><input type="checkbox" id="canvas-raster" checked /> Canvas raster</label>
      <button type="button" id="rerun">Re-run audit</button>
      <button type="button" id="copy-fails">Copy U+ list</button>
    </div>
    <div class="stats" id="stats"></div>
  </header>
  <main>
    <pre id="fail-list"></pre>
    <div class="grid" id="grid"></div>
  </main>
  <canvas id="thumb-probe" width="28" height="28"></canvas>

  <script type="module">
    import {
      FULL_MATRIX_CHARS,
      CIPHER_BMP_SAFE_EXTRA,
      CIPHER_MATH_DECORATIVE,
      DECORATIVE_CIPHER_CHARS,
      CIPHER_NUMERALS,
      CIPHER_LATIN,
      CIPHER_LATIN_EXTENDED,
      CIPHER_GREEK,
      CIPHER_CYRILLIC,
      CIPHER_RUNIC,
      ARMENIAN_CIPHER_CHARS,
      CIPHER_GEORGIAN,
      CIPHER_GEORGIAN_MTAVRULI,
      HEBREW_CIPHER_CHARS,
      CIPHER_ARABIC,
      CIPHER_TIBETAN,
      CIPHER_CJK,
      CIPHER_KANA,
      CIPHER_HANGUL,
      CIPHER_DEVANAGARI,
      CIPHER_BENGALI,
      CIPHER_TELUGU,
      CIPHER_KANNADA,
      CIPHER_MALAYALAM,
      CIPHER_SINHALA,
      CIPHER_MYANMAR,
      CIPHER_THAI,
      CIPHER_KHMER,
      CIPHER_BAYBAYIN,
      CIPHER_VAI,
      CIPHER_CHEROKEE,
    } from '../js/data/cipher-glyphs.data.js';

    const SECTIONS = [
      ['BMP safe extra', CIPHER_BMP_SAFE_EXTRA],
      ['Math / decorative', CIPHER_MATH_DECORATIVE],
      ['Decorative marks', DECORATIVE_CIPHER_CHARS],
      ['Numerals', CIPHER_NUMERALS],
      ['Latin', CIPHER_LATIN],
      ['Latin extended', CIPHER_LATIN_EXTENDED],
      ['Greek', CIPHER_GREEK],
      ['Cyrillic', CIPHER_CYRILLIC],
      ['Runic', CIPHER_RUNIC],
      ['Armenian', ARMENIAN_CIPHER_CHARS],
      ['Georgian', CIPHER_GEORGIAN],
      ['Georgian Mtavruli', CIPHER_GEORGIAN_MTAVRULI],
      ['Hebrew', HEBREW_CIPHER_CHARS],
      ['Arabic', CIPHER_ARABIC],
      ['Tibetan', CIPHER_TIBETAN],
      ['CJK', CIPHER_CJK],
      ['Kana', CIPHER_KANA],
      ['Hangul', CIPHER_HANGUL],
      ['Devanagari', CIPHER_DEVANAGARI],
      ['Bengali', CIPHER_BENGALI],
      ['Telugu', CIPHER_TELUGU],
      ['Kannada', CIPHER_KANNADA],
      ['Malayalam', CIPHER_MALAYALAM],
      ['Sinhala', CIPHER_SINHALA],
      ['Myanmar', CIPHER_MYANMAR],
      ['Thai', CIPHER_THAI],
      ['Khmer', CIPHER_KHMER],
      ['Baybayin', CIPHER_BAYBAYIN],
      ['Vai', CIPHER_VAI],
      ['Cherokee', CIPHER_CHEROKEE],
    ];

    const LAST_RESORT_PROBE_CHARS =
      CIPHER_VAI + CIPHER_BAYBAYIN + CIPHER_CHEROKEE.slice(0, 16) + CIPHER_TIBETAN.slice(0, 8);

    const poolSelect = document.getElementById('pool-select');
    const sectionSelect = document.getElementById('section-select');
    const sizeSelect = document.getElementById('size-select');
    const failuresOnly = document.getElementById('failures-only');
    const canvasRaster = document.getElementById('canvas-raster');
    const grid = document.getElementById('grid');
    const statsEl = document.getElementById('stats');
    const failList = document.getElementById('fail-list');
    const thumbCanvas = document.getElementById('thumb-probe');

    let lastFailures = [];

    for (const [name] of SECTIONS) {
      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name;
      sectionSelect.appendChild(opt);
    }

    function cipherWheelFont(sizePx) {
      const arabic = '"Geeza Pro", "Noto Sans Arabic", "Arial Unicode MS"';
      const tibetan = '"Kailasa", "Noto Sans Tibetan", "Tibetan Machine Uni"';
      const kannada = '"Kannada Sangam MN", "Noto Sans Kannada", "Tunga"';
      return `${sizePx}px ${arabic}, ${tibetan}, ${kannada}, monospace, sans-serif`;
    }

    function formatCodePoint(ch) {
      const cp = ch.codePointAt(0);
      return `U+${cp.toString(16).toUpperCase().padStart(cp > 0xffff ? 4 : 4, '0')}`;
    }

    function uniqueChars(str) {
      return [...new Set([...str])];
    }

    function getActivePool() {
      if (poolSelect.value === 'section') {
        const name = sectionSelect.value;
        const hit = SECTIONS.find(([n]) => n === name);
        return uniqueChars(hit ? hit[1] : '');
      }
      return uniqueChars(FULL_MATRIX_CHARS);
    }

    function buildMeasureBaselines(ctx, font) {
      ctx.font = font;
      const missing = ctx.measureText('\uFFFD').width;
      const narrow = ctx.measureText('i').width;
      const wide = ctx.measureText('W').width;
      let boxRef = missing;
      for (const ch of LAST_RESORT_PROBE_CHARS) {
        const w = ctx.measureText(ch).width;
        if (w > boxRef) boxRef = w;
      }
      return { missing, narrow, wide, boxRef };
    }

    function isNumberedByWidth(ch, ctx, font, baselines) {
      ctx.font = font;
      const w = ctx.measureText(ch).width;
      if (w <= 0) return { flagged: true, reason: 'zero width', width: w };
      const { missing, narrow, wide, boxRef } = baselines;
      if (missing > 0 && Math.abs(w - missing) < 0.75) {
        return { flagged: true, reason: 'tofu width', width: w };
      }
      if (boxRef > wide * 1.15 && Math.abs(w - boxRef) < 1.5) {
        return { flagged: true, reason: 'box ref width', width: w };
      }
      if (w > Math.max(wide * 1.55, narrow * 3.2, 11)) {
        return { flagged: true, reason: 'oversized', width: w };
      }
      return { flagged: false, reason: 'ok', width: w };
    }

    function rasterProbe(ch, ctx, font) {
      const cx = 14;
      const cy = 14;
      try {
        ctx.clearRect(0, 0, 28, 28);
        ctx.font = font;
        ctx.fillStyle = '#00ff00';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(ch, cx, cy);
        const { data } = ctx.getImageData(0, 0, 28, 28);
        let pixels = 0;
        for (let y = 0; y < 14; y += 2) {
          for (let x = 0; x < 14; x += 2) {
            if (data[((y * 28 + x) * 4) + 3] > 24) pixels++;
          }
        }
        return { ok: true, pixels };
      } catch (err) {
        return { ok: false, error: String(err) };
      }
    }

    function auditGlyph(ch, ctx, font, baselines, useRaster) {
      const widthResult = isNumberedByWidth(ch, ctx, font, baselines);
      let raster = null;
      let status = widthResult.flagged ? 'bad' : 'ok';
      let reason = widthResult.reason;

      if (useRaster) {
        raster = rasterProbe(ch, ctx, font);
        if (!raster.ok) {
          status = status === 'bad' ? 'bad' : 'warn';
          reason += ' · readback blocked';
        } else if (raster.pixels === 0) {
          status = 'bad';
          reason = 'blank raster';
        } else if (!widthResult.flagged && raster.pixels > 28) {
          status = 'warn';
          reason = `heavy raster (${raster.pixels}px)`;
        }
      }

      return {
        ch,
        cp: formatCodePoint(ch),
        status,
        reason,
        width: widthResult.width.toFixed(1),
        raster,
      };
    }

    function renderResults(results) {
      const fails = results.filter((r) => r.status === 'bad');
      const warns = results.filter((r) => r.status === 'warn');
      lastFailures = fails;

      statsEl.innerHTML = `
        <span>Total <strong>${results.length}</strong></span>
        <span>OK <strong class="ok">${results.length - fails.length - warns.length}</strong></span>
        <span>Box / fail <strong class="bad">${fails.length}</strong></span>
        <span>Suspect <strong class="warn">${warns.length}</strong></span>
        <span>localStorage <strong class="ok">not used</strong></span>
      `;

      if (fails.length) {
        failList.classList.add('visible');
        failList.textContent = fails
          .map((r) => `${r.cp}  ${r.ch}  (${r.reason}, w=${r.width})`)
          .join('\n');
      } else {
        failList.classList.remove('visible');
        failList.textContent = '';
      }

      const show = failuresOnly.checked
        ? results.filter((r) => r.status !== 'ok')
        : results;

      grid.innerHTML = '';
      const frag = document.createDocumentFragment();
      for (const r of show) {
        const cell = document.createElement('div');
        cell.className = `cell ${r.status}`;
        const rasterNote = r.raster?.ok
          ? `raster ${r.raster.pixels}px`
          : (r.raster ? 'no readback' : '');
        cell.innerHTML = `
          <div class="glyph">${r.ch}</div>
          <div class="code">${r.cp}</div>
          <div class="meta">w=${r.width}${rasterNote ? ` · ${rasterNote}` : ''}</div>
          <span class="tag">${r.reason}</span>
        `;
        frag.appendChild(cell);
      }
      grid.appendChild(frag);
    }

    function runAudit() {
      const sizePx = Number(sizeSelect.value) || 16;
      const font = cipherWheelFont(sizePx);
      const ctx = thumbCanvas.getContext('2d', { willReadFrequently: true });
      const baselines = buildMeasureBaselines(ctx, font);
      const pool = getActivePool();
      const useRaster = canvasRaster.checked;

      const results = pool.map((ch) => auditGlyph(ch, ctx, font, baselines, useRaster));
      renderResults(results);
    }

    poolSelect.addEventListener('change', () => {
      sectionSelect.hidden = poolSelect.value !== 'section';
      runAudit();
    });
    sectionSelect.addEventListener('change', runAudit);
    sizeSelect.addEventListener('change', runAudit);
    failuresOnly.addEventListener('change', runAudit);
    canvasRaster.addEventListener('change', runAudit);
    document.getElementById('rerun').addEventListener('click', runAudit);
    document.getElementById('copy-fails').addEventListener('click', async () => {
      const text = lastFailures.map((r) => r.cp).join(' ');
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        prompt('Copy failures:', text);
      }
    });

    runAudit();
  </script>
</body>
</html>
