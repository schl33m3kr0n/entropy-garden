<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cipher glyph audit</title>
  <style>
    body { font: 12px/1.4 monospace; background: #111; color: #0f0; margin: 12px; }
    h2 { margin: 1em 0 0.4em; font-size: 13px; }
    #summary { white-space: pre-wrap; margin-bottom: 12px; }
    .grid { display: flex; flex-wrap: wrap; gap: 2px; max-width: 100%; }
    .cell {
      width: 22px; height: 22px; display: flex; align-items: center; justify-content: center;
      background: #1a1a1a; border: 1px solid #333; font: 16px monospace; color: #0f0;
    }
    .cell.bad { border-color: #f04; background: #301818; color: #f88; }
    .cell.ok { border-color: #262; }
  </style>
</head>
<body>
<p id="summary">Running audit…</p>
<h2>Desktop pool (16px monospace — same as cipher wheels)</h2>
<div id="grid-desktop" class="grid"></div>
<script type="module">
import { FULL_MATRIX_CHARS } from '../../js/data/cipher-glyphs.data.js';

const FONT = '16px monospace';
const SIZE = 28;
const CX = SIZE / 2;
const CY = SIZE / 2;

function rasterSignature(ctx, ch) {
  ctx.clearRect(0, 0, SIZE, SIZE);
  ctx.font = FONT;
  ctx.fillStyle = '#00ff00';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(ch, CX, CY);
  const { data } = ctx.getImageData(0, 0, SIZE, SIZE);
  let pixels = 0;
  let bits = '';
  for (let y = 0; y < 14; y += 2) {
    for (let x = 0; x < 14; x += 2) {
      const a = data[((y * SIZE + x) * 4) + 3];
      const on = a > 24 ? 1 : 0;
      pixels += on;
      bits += on;
    }
  }
  return { bits, pixels };
}

const canvas = document.createElement('canvas');
canvas.width = SIZE;
canvas.height = SIZE;
const ctx = canvas.getContext('2d');

const tofuRefs = [
  '\uFFFD',
  '\u{1F700}',
  '\u{10FFFF}',
];
const refBits = new Set(tofuRefs.map((ch) => rasterSignature(ctx, ch).bits));

const pool = [...FULL_MATRIX_CHARS];
const bad = [];
const alchemicalTofuBits = rasterSignature(ctx, '\u{1F700}').bits;

for (const ch of pool) {
  const { bits, pixels } = rasterSignature(ctx, ch);
  const cp = ch.codePointAt(0);
  const code = cp.toString(16).toUpperCase().padStart(4, '0');
  let reason = null;
  if (pixels === 0) reason = 'blank';
  else if (refBits.has(bits)) reason = 'tofu-ref';
  else if (cp >= 0x1f700 && cp <= 0x1f77f && bits === alchemicalTofuBits) reason = 'tofu-alchemical';
  if (reason) bad.push({ ch, code, reason, bits });
}

const badSet = new Set(bad.map((b) => b.ch));
const grid = document.getElementById('grid-desktop');
for (const ch of pool) {
  const el = document.createElement('span');
  el.className = 'cell ' + (badSet.has(ch) ? 'bad' : 'ok');
  el.title = ch.codePointAt(0).toString(16).toUpperCase().padStart(4, '0');
  el.textContent = ch;
  grid.appendChild(el);
}

const byReason = bad.reduce((acc, b) => {
  acc[b.reason] = (acc[b.reason] || 0) + 1;
  return acc;
}, {});

globalThis.glyphAudit = {
  font: FONT,
  total: pool.length,
  removeCount: bad.length,
  keepCount: pool.length - bad.length,
  remove: bad,
  removeChars: bad.map((b) => b.ch).join(''),
  byReason,
};

document.getElementById('summary').textContent =
  `Font: ${FONT}\n` +
  `Total: ${pool.length}  Remove: ${bad.length}  Keep: ${pool.length - bad.length}\n` +
  `Reasons: ${JSON.stringify(byReason)}\n` +
  `globalThis.glyphAudit.remove lists every dropped glyph (U+ codes in DevTools).`;
</script>
</body>
</html>
