<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cipher glyph catalog</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --panel: #161616;
      --border: #333;
      --text: #b8ffb8;
      --muted: #6a8f6a;
      --accent: #0f0;
      --glyph-size: 22px;
      --cell: 52px;
    }
    * { box-sizing: border-box; }
    body {
      font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, monospace;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0 12px 48px;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(13, 13, 13, 0.92);
      backdrop-filter: blur(6px);
      border-bottom: 1px solid var(--border);
      padding: 10px 0 12px;
      margin-bottom: 8px;
    }
    h1 { font-size: 15px; margin: 0 0 8px; color: var(--accent); font-weight: 600; }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      align-items: center;
    }
    label { display: flex; align-items: center; gap: 6px; color: var(--muted); }
    select, input[type="search"] {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 8px;
      border-radius: 4px;
      font: inherit;
    }
    input[type="search"] { min-width: 200px; flex: 1; }
    #stats { color: var(--muted); font-size: 11px; }
    nav.toc {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 10px 0 4px;
    }
    nav.toc a {
      color: var(--muted);
      text-decoration: none;
      padding: 2px 6px;
      border: 1px solid var(--border);
      border-radius: 3px;
      font-size: 10px;
    }
    nav.toc a:hover { color: var(--accent); border-color: #484; }
    section {
      margin: 20px 0 28px;
      scroll-margin-top: 120px;
    }
    section h2 {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      margin: 0 0 4px;
      letter-spacing: 0.02em;
    }
    section .meta {
      color: var(--muted);
      font-size: 10px;
      margin-bottom: 8px;
    }
    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .cell {
      width: var(--cell);
      min-height: var(--cell);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 2px;
      cursor: default;
    }
    .cell:hover {
      border-color: #5a5;
      background: #1e2a1e;
    }
    .cell.hidden { display: none; }
    .cell .glyph {
      font-size: var(--glyph-size);
      line-height: 1;
      color: #0f0;
    }
    .cell .code {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0;
    }
    .cell.copied { outline: 1px solid var(--accent); }
    #all-section .grid { gap: 3px; }
    footer {
      margin-top: 24px;
      color: var(--muted);
      font-size: 10px;
    }
  </style>
</head>
<body>
<header>
  <h1>Cipher glyph catalog</h1>
  <div class="controls">
    <label>
      Font
      <select id="font-select">
        <option value="desktop">16px monospace (desktop wheels)</option>
        <option value="ios">16px Avenir / system (iOS wheels)</option>
      </select>
    </label>
    <label>
      Glyph size
      <select id="size-select">
        <option value="18">18px</option>
        <option value="22" selected>22px</option>
        <option value="28">28px</option>
        <option value="36">36px</option>
      </select>
    </label>
    <input type="search" id="search" placeholder="Filter: char, U+1F700, name…" autocomplete="off">
  </div>
  <p id="stats"></p>
  <nav class="toc" id="toc"></nav>
</header>

<main id="main"></main>
<footer>
  Click a cell to copy the character. Hover for full code point. Serve via local HTTP:
  <code>python3 -m http.server 8877</code> then open
  <code>/scripts/dev/glyph-catalog.html</code>
</footer>

<script type="module">
import * as glyphs from '../../js/data/cipher-glyphs.data.js';

const IOS_CIPHER_CHARS =
  'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789' +
  '∑∫∆∞≈±×÷√∧∨∩∪∴∵∼≠≤≥⊕⊗⊥─□△▽◇○◎★☆♪♀♂☼' +
  'αβγδεζηθικλμνξοπρστυφχψω' +
  'АБВГДЕЖЗИКЛМНОПРСТУФХЦЧШЮЯ' +
  'アイウエオカキクケコサシスセソタチツテトナニヌネノ' +
  'ハヒフヘホマミムメモヤユヨラリルレロワン' +
  '道禅空幻心理气天阴阳' +
  glyphs.HEBREW_CIPHER_CHARS +
  '!?@#$%&*_+=<>[]{}|/~';

/** Browse by category (same order as cipher-glyphs.data.js). */
const CATEGORIES = [
  { id: 'latin', title: 'Latin extended', key: 'CIPHER_LATIN_EXTENDED' },
  { id: 'greek', title: 'Greek', key: 'CIPHER_GREEK' },
  { id: 'runic', title: 'Elder Futhark', key: 'CIPHER_RUNIC' },
  { id: 'hebrew', title: 'Hebrew', key: 'HEBREW_CIPHER_CHARS' },
  { id: 'arabic', title: 'Arabic', key: 'CIPHER_ARABIC' },
  { id: 'cyrillic', title: 'Cyrillic', key: 'CIPHER_CYRILLIC' },
  { id: 'armenian-upper', title: 'Armenian uppercase', key: 'ARMENIAN_CIPHER_UPPER' },
  { id: 'armenian-lower', title: 'Armenian lowercase', key: 'ARMENIAN_CIPHER_LOWER' },
  { id: 'armenian-punct', title: 'Armenian punctuation', key: 'ARMENIAN_CIPHER_PUNCT' },
  { id: 'math', title: 'Math & BMP decorative', key: 'CIPHER_MATH_DECORATIVE' },
  { id: 'decorative', title: 'Decorative marks', key: 'DECORATIVE_CIPHER_CHARS' },
  { id: 'cjk', title: 'CJK ideographs', key: 'CIPHER_CJK' },
  { id: 'kana', title: 'Japanese kana', key: 'CIPHER_KANA' },
  { id: 'hangul', title: 'Hangul', key: 'CIPHER_HANGUL' },
  { id: 'devanagari', title: 'Devanagari', key: 'CIPHER_DEVANAGARI' },
  { id: 'bengali', title: 'Bengali', key: 'CIPHER_BENGALI' },
  { id: 'telugu', title: 'Telugu', key: 'CIPHER_TELUGU' },
  { id: 'malayalam', title: 'Malayalam', key: 'CIPHER_MALAYALAM' },
  { id: 'sinhala', title: 'Sinhala', key: 'CIPHER_SINHALA' },
  { id: 'myanmar', title: 'Myanmar', key: 'CIPHER_MYANMAR' },
  { id: 'thai', title: 'Thai', key: 'CIPHER_THAI' },
  { id: 'khmer', title: 'Khmer', key: 'CIPHER_KHMER' },
  { id: 'baybayin', title: 'Baybayin', key: 'CIPHER_BAYBAYIN' },
  { id: 'cherokee', title: 'Cherokee', key: 'CIPHER_CHEROKEE' },
  { id: 'syllabics-1', title: 'Canadian syllabics (U+1400–U+144F)', key: 'CIPHER_SYLLABICS_1' },
  { id: 'syllabics-2', title: 'Canadian syllabics (U+1450–U+148F)', key: 'CIPHER_SYLLABICS_2' },
  { id: 'syllabics-3', title: 'Canadian syllabics (U+1490–U+14CF)', key: 'CIPHER_SYLLABICS_3' },
  { id: 'syllabics-4', title: 'Canadian syllabics (U+14D0–U+150F)', key: 'CIPHER_SYLLABICS_4' },
  { id: 'syllabics-5', title: 'Canadian syllabics (U+1510–U+154F)', key: 'CIPHER_SYLLABICS_5' },
  { id: 'syllabics-6', title: 'Canadian syllabics (U+1550–U+158F)', key: 'CIPHER_SYLLABICS_6' },
  { id: 'syllabics-7', title: 'Canadian syllabics (U+1590–U+15CF)', key: 'CIPHER_SYLLABICS_7' },
  { id: 'syllabics-8', title: 'Canadian syllabics (U+15D0–U+167F)', key: 'CIPHER_SYLLABICS_8' },
  { id: 'georgian', title: 'Georgian', key: 'CIPHER_GEORGIAN' },
  { id: 'georgian-mt', title: 'Georgian Mtavruli', key: 'CIPHER_GEORGIAN_MTAVRULI' },
  { id: 'vai', title: 'Vai', key: 'CIPHER_VAI' },
  { id: 'ethiopic', title: 'Ethiopic', key: 'CIPHER_ETHIOPIC' },
  { id: 'alchemical-1', title: 'Alchemical (U+1F700–U+1F73F)', key: 'ALCHEMICAL_CIPHER_1' },
  { id: 'alchemical-2', title: 'Alchemical (U+1F740–U+1F77F)', key: 'ALCHEMICAL_CIPHER_2' },
  { id: 'alchemical-3', title: 'Alchemical (U+1F780–U+1F7BF)', key: 'ALCHEMICAL_CIPHER_3' },
  { id: 'alchemical-4', title: 'Alchemical (U+1F7C0–U+1F7FF)', key: 'ALCHEMICAL_CIPHER_4' },
];

const fonts = {
  desktop: '16px monospace',
  ios: "16px Avenir, -apple-system, BlinkMacSystemFont, sans-serif",
};

function formatCode(ch) {
  const cp = ch.codePointAt(0);
  return 'U+' + cp.toString(16).toUpperCase().padStart(cp > 0xffff ? 5 : 4, '0');
}

function makeCell(ch) {
  const el = document.createElement('button');
  el.type = 'button';
  el.className = 'cell';
  el.dataset.code = formatCode(ch);
  el.dataset.char = ch;
  el.title = `${ch}  ${formatCode(ch)}  (click to copy)`;

  const g = document.createElement('span');
  g.className = 'glyph';
  g.textContent = ch;
  const c = document.createElement('span');
  c.className = 'code';
  c.textContent = formatCode(ch).replace('U+', '');
  el.append(g, c);

  el.addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(ch);
      el.classList.add('copied');
      setTimeout(() => el.classList.remove('copied'), 400);
    } catch {
      /* ignore */
    }
  });
  return el;
}

function renderGrid(container, str) {
  container.replaceChildren();
  for (const ch of str) container.appendChild(makeCell(ch));
}

const main = document.getElementById('main');
const toc = document.getElementById('toc');

for (const cat of CATEGORIES) {
  const str = glyphs[cat.key];
  if (!str) continue;

  const a = document.createElement('a');
  a.href = '#' + cat.id;
  a.textContent = cat.title;
  toc.appendChild(a);

  const section = document.createElement('section');
  section.id = cat.id;
  const h2 = document.createElement('h2');
  h2.textContent = cat.title;
  const meta = document.createElement('p');
  meta.className = 'meta';
  meta.textContent = `${cat.key} · ${[...str].length} glyphs`;
  const grid = document.createElement('div');
  grid.className = 'grid';
  grid.dataset.category = cat.id;
  renderGrid(grid, str);
  section.append(h2, meta, grid);
  main.appendChild(section);
}

const allSection = document.createElement('section');
allSection.id = 'all';
const allLink = document.createElement('a');
allLink.href = '#all';
allLink.textContent = 'Full pool';
toc.prepend(allLink);

const allH2 = document.createElement('h2');
allH2.textContent = 'Full desktop pool (concatenated)';
const allMeta = document.createElement('p');
allMeta.className = 'meta';
allMeta.textContent = `FULL_MATRIX_CHARS · ${[...glyphs.FULL_MATRIX_CHARS].length} glyphs`;
const allGrid = document.createElement('div');
allGrid.className = 'grid';
allGrid.id = 'all-grid';
renderGrid(allGrid, glyphs.FULL_MATRIX_CHARS);
allSection.append(allH2, allMeta, allGrid);
main.appendChild(allSection);

const iosSection = document.createElement('section');
iosSection.id = 'ios';
const iosLink = document.createElement('a');
iosLink.href = '#ios';
iosLink.textContent = 'iOS pool';
toc.appendChild(iosLink);

const iosH2 = document.createElement('h2');
iosH2.textContent = 'iOS wheel pool (reference)';
const iosMeta = document.createElement('p');
iosMeta.className = 'meta';
iosMeta.textContent = `${[...IOS_CIPHER_CHARS].length} glyphs · not in cipher-glyphs.data.js`;
const iosGrid = document.createElement('div');
iosGrid.className = 'grid';
iosGrid.id = 'ios-grid';
renderGrid(iosGrid, IOS_CIPHER_CHARS);
iosSection.append(iosH2, iosMeta, iosGrid);
main.appendChild(iosSection);

const fontSelect = document.getElementById('font-select');
const sizeSelect = document.getElementById('size-select');
const search = document.getElementById('search');
const stats = document.getElementById('stats');

function applyFont() {
  const font = fonts[fontSelect.value] || fonts.desktop;
  document.querySelectorAll('.cell .glyph').forEach((el) => {
    el.style.font = font;
  });
  stats.textContent = `Font: ${font} · Desktop pool: ${[...glyphs.FULL_MATRIX_CHARS].length} · iOS pool: ${[...IOS_CIPHER_CHARS].length}`;
}

function applySize() {
  document.documentElement.style.setProperty('--glyph-size', sizeSelect.value + 'px');
}

function applyFilter() {
  const q = search.value.trim().toLowerCase();
  let visible = 0;
  let total = 0;
  document.querySelectorAll('.cell').forEach((cell) => {
    total++;
    const ch = cell.dataset.char || '';
    const code = (cell.dataset.code || '').toLowerCase();
    const cat = cell.closest('section')?.id || '';
    const match = !q
      || ch.includes(q)
      || code.includes(q.replace(/^u\+?/, 'u+'))
      || cat.includes(q);
    cell.classList.toggle('hidden', !match);
    if (match) visible++;
  });
  stats.textContent = (stats.textContent.split(' · ').slice(0, 2).join(' · '))
    + ` · Showing ${visible}/${total}`;
}

fontSelect.addEventListener('change', applyFont);
sizeSelect.addEventListener('change', applySize);
search.addEventListener('input', applyFilter);

applyFont();
applySize();
applyFilter();

globalThis.glyphCatalog = {
  categories: CATEGORIES,
  full: glyphs.FULL_MATRIX_CHARS,
  ios: IOS_CIPHER_CHARS,
};
</script>
</body>
</html>
